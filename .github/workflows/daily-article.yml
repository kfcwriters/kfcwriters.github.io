name: Daily Journal Article
on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Generate article
        run: python generate_article.py
      - name: Get current date
        id: date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "article-${{ steps.date.outputs.DATE }}"
          name: "Article ${{ steps.date.outputs.DATE }}"
          generate_release_notes: false
          make_latest: false
      - name: Commit article
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add Journal/
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily article ${{ steps.date.outputs.DATE }}"
          git push
