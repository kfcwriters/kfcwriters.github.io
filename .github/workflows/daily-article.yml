name: Daily Journal Article
on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests weasyprint
      - name: Generate article
        run: python scripts/generate_article.py
      - name: Create GitHub Release for DOI
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: "Article ${{ env.DATE }}"
          tag_name: "article-${{ env.DATE }}"
          generate_release_notes: false
          make_latest: false
      - name: Fetch DOI from Zenodo
        run: |
          # Zenodo will automatically assign a DOI after release.
          # We wait 30s and query Zenodo API.
          sleep 30
          python scripts/fetch_doi.py --tag "article-${{ env.DATE }}"
      - name: Update article HTML with DOI
        run: python scripts/inject_doi.py --file Journal/review-${{ env.DATE }}.html
      - name: Commit DOI update
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add Journal/
          git diff --quiet && git diff --staged --quiet || git commit -m "Add DOI to article ${{ env.DATE }}"
          git push
      - name: Update index badges
        run: python scripts/update_badges.py
