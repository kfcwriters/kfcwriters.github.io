name: Daily Journal Article
on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Generate article
        id: gen
        run: python generate_article.py
      - name: Get current date
        id: date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "article-${{ steps.date.outputs.DATE }}"
          name: "Article ${{ steps.date.outputs.DATE }}"
          generate_release_notes: false
          make_latest: false
      - name: Wait for Zenodo to process
        run: sleep 45
      - name: Fetch DOI
        id: doi
        env:
          RELEASE_TAG: "article-${{ steps.date.outputs.DATE }}"
        run: python fetch_doi.py
      - name: Inject DOI into article
        run: python inject_doi.py
      - name: Update homepage badges
        run: python update_badges.py
      - name: Commit changes
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add Journal/ doi_cache.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Add DOI to article ${{ steps.date.outputs.DATE }}"
          git push
