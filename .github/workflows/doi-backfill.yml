name: DOI Backfill
on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Run DOI backfill
        run: python backfill_doi.py
      - name: Commit DOI updates
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add Journal/ doi_cache.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Backfill DOIs for articles"
          git push
