name: DOI Backfill (Hourly)
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Run backfill
        run: python backfill_doi.py
      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Journal/ doi_cache.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto‑inject DOIs"
          git push
