name: Generate XML Sitemap
on:
  workflow_dispatch:   # manual trigger
  schedule:
    - cron: '0 0 * * 0' # every Sunday at midnight UTC

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate sitemap
        run: |
          python -c "
          import os
          from datetime import datetime
          urls = []
          # List all article pages in Journal/
          for file in os.listdir('Journal'):
              if file.startswith('review-') and file.endswith('.html'):
                  urls.append(f'https://kfcwriters.github.io/Journal/{file}')
          if not urls:
              print('No articles found. Sitemap will not be created.')
          else:
              sitemap = '<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n'
              sitemap += '<urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\">\n'
              for url in urls:
                  lastmod = datetime.now().strftime('%Y-%m-%d')
                  sitemap += f'  <url>\n    <loc>{url}</loc>\n    <lastmod>{lastmod}</lastmod>\n    <changefreq>monthly</changefreq>\n  </url>\n'
              sitemap += '</urlset>'
              with open('sitemap.xml', 'w') as f:
                  f.write(sitemap)
          "
      - name: Commit sitemap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --quiet && git diff --staged --quiet || git commit -m "Update XML sitemap"
          git push
