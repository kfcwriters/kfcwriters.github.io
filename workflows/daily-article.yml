name: Daily Medical Article
on:
  schedule:
    - cron: '0 9 * * *'   # runs daily at 9 AM UTC
  workflow_dispatch:       # also allows manual run

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install openai requests
      - name: Generate article using AI (Gemini free tier)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_article.py
      - name: Commit and push new article
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add Journal/
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily AI article $(date +'%Y-%m-%d')"
          git push
