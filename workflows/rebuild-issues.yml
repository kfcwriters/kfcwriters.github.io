name: Rebuild Journal Issues
on:
  schedule:
    - cron: '0 0 1 * *'   # At 00:00 on the 1st of every month
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Run issue builder
        env:
          WEBSITE_REPO_TOKEN: ${{ secrets.WEBSITE_REPO_TOKEN }}
        run: python rebuild_journal_issues.py
      - name: Commit changes
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add Journal/
          git diff --quiet && git diff --staged --quiet || git commit -m "Rebuild issues and volumes $(date +'%Y-%m-%d')"
          git push
